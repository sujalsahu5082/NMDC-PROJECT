name: CI - NMDC Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-check:
    name: Python Backend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Check for syntax errors
        run: |
          python -m py_compile backend/*.py || true

  frontend-check:
    name: Frontend HTML Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML files exist
        run: |
          echo "Checking frontend files..."
          ls frontend/ || echo "No frontend folder found"
          ls *.html || echo "No root HTML files found"
          echo "✅ File check complete"
